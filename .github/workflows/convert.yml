name: Convert HTML

on:
  push:
    paths:
      - '/public/An-Anarchist-Woman.html'
      - 'convert.py'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run conversion script
        run: python3 convert.py
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add An-Anarchist-Woman-refactored.html
          git commit -m "Auto-refactor HTML to modern format" || echo "No changes"
          git push
