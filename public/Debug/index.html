<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SW Checker</title></head>
<body>
<h1>Service Worker Diagnostics</h1>
<pre id="output">Checking...</pre>

<script>
const out = document.getElementById('output');

async function check() {
  if (!('serviceWorker' in navigator)) {
    out.textContent = '❌ Service Workers not supported\nThis browser does not support SW (check Safari/Chrome versions)';
    return;
  }

  try {
    const reg = await navigator.serviceWorker.getRegistration('/sw-idb.js');
    
    if (!reg) {
      out.textContent = '❌ No SW registration found\n\nTry manually registering:';
      out.innerHTML += '<button onclick="manualRegister()">Register Now</button>';
      return;
    }

    out.textContent = [
      '✓ SW Registration Found',
      '',
      'Scope: ' + reg.scope,
      'Active Worker: ' + (reg.active ? reg.active.state : 'none'),
      'Installing: ' + (reg.installing ? reg.installing.state : 'none'),
      'Waiting: ' + (reg.waiting ? reg.waiting.state : 'none'),
      '',
      'Controller present: ' + (navigator.serviceWorker.controller ? 'YES' : 'NO'),
      '',
      'To see full details, register with updateViaCache: "none"'
    ].join('\n');

  } catch (err) {
    out.textContent = '❌ Error checking SW: ' + err.message;
  }
}

async function manualRegister() {
  try {
    const reg = await navigator.serviceWorker.register('/sw-idb.js', {
      scope: '/',
      updateViaCache: 'none'
    });
    out.innerHTML = '✓ Manual registration started!<br/>State: ' + (reg.installing?.state || 'pending');
  } catch (err) {
    out.textContent = '❌ Manual registration failed: ' + err.message;
  }
}

check();
</script>
</body>
</html>
